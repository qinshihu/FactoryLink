name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "frontend/dist;frontend/dist" `
            --collect-all fastapi `
            --collect-all uvicorn `
            --collect-all pymodbus `
            --collect-all paho.mqtt.client `
            --collect-all websockets `
            --collect-all pystray `
            --collect-all httpx `
            --collect-all openpyxl `
            --collect-all python_multipart `
            --hidden-import snap7 `
            --hidden-import pymcprotocol `
            --name "FactoryLink" `
            backend/main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactoryLink-exe
          path: dist/FactoryLink.exe

      - name: Create Release and upload EXE
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FactoryLink.exe
          name: FactoryLink ${{ github.ref_name }}
          body: |
            ## FactoryLink 工业数据采集网关 ${{ github.ref_name }}

            ### 使用方法
            1. 下载 `FactoryLink.exe`
            2. 双击运行（右下角出现托盘图标）
            3. 浏览器自动打开配置页面
            4. 配置 PLC 设备 → 启动采集

            ### 支持的协议
            - Modbus TCP / RTU
            - 西门子 S7 (S7-1200/1500/300/400)
            - 三菱 MC (FX5U / Q系列 / L系列)

            ### Docker 镜像
            ```
            docker pull registry.cn-hangzhou.aliyuncs.com/huluwa666/tsq-images-hub:factorylink-latest
            ```
